  logical_subscriber:
    image: postgres:15
    container_name: pg-logical-sub
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Mishka
      POSTGRES_DB: cinema_db
      TZ: UTC
    ports:
      - "5436:5432"
    volumes:
      - logical_sub_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d cinema_db" ]
