version: '3.8'

services:
  primary:
    image: postgres:15
    container_name: pg-primary
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Mishka
      POSTGRES_DB: cinema_db
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./primary/init:/docker-entrypoint-initdb.d
    command: >

      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cinema_db"]
      interval: 5s
      timeout: 5s
      retries: 20

