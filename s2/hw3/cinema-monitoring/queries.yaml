# Активные сессии по статусам
pg_active_sessions:
  query: |
    SELECT
      COALESCE(state, 'unknown') as state,
      COUNT(*) as count
    FROM pg_stat_activity
    WHERE datname = current_database()
    GROUP BY state
  metrics:
    - state:
        usage: "LABEL"
        description: "Connection state"
    - count:
        usage: "GAUGE"
        description: "Number of connections by state"

# Статистика по типам запросов (SELECT/INSERT/DELETE)
pg_query_type_stats:
  query: |
    SELECT
      CASE 
        WHEN query ~* '^\\s*SELECT' THEN 'SELECT'
        WHEN query ~* '^\\s*INSERT' THEN 'INSERT'
        WHEN query ~* '^\\s*UPDATE' THEN 'UPDATE'
        WHEN query ~* '^\\s*DELETE' THEN 'DELETE'
        WHEN query ~* '^\\s*WITH' THEN 'SELECT'
        ELSE 'OTHER'
      END as query_type,
      SUM(calls) as total_calls,
      SUM(mean_exec_time * calls) as total_time_ms
    FROM pg_stat_statements
    WHERE dbid = (SELECT oid FROM pg_database WHERE datname = current_database())
    GROUP BY 
      CASE 
        WHEN query ~* '^\\s*SELECT' THEN 'SELECT'
        WHEN query ~* '^\\s*INSERT' THEN 'INSERT'
        WHEN query ~* '^\\s*UPDATE' THEN 'UPDATE'
        WHEN query ~* '^\\s*DELETE' THEN 'DELETE'
        WHEN query ~* '^\\s*WITH' THEN 'SELECT'
        ELSE 'OTHER'
      END
  metrics:
    - query_type:
        usage: "LABEL"
        description: "SQL query type"
    - total_calls:
        usage: "COUNTER"
        description: "Total number of query calls"
    - total_time_ms:
        usage: "COUNTER"
        description: "Total execution time in milliseconds"

# Версия PostgreSQL
pg_version_info:
  query: |
    SELECT
      1 as up,
      current_setting('server_version') as server_version,
      current_setting('server_version_num')::integer as server_version_num
  metrics:
    - up:
        usage: "GAUGE"
        description: "Database up status"
    - server_version:
        usage: "LABEL"
        description: "PostgreSQL server version"
    - server_version_num:
        usage: "GAUGE"
        description: "PostgreSQL server version number"